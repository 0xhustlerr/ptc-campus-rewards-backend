# Example nginx reverse proxy for AWS EC2 — TLS certificates via certbot

upstream ptc_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api.rewards.example.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.rewards.example.edu;

    ssl_certificate     /etc/letsencrypt/live/api.rewards.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rewards.example.edu/privkey.pem;

    client_max_body_size 2m;

    location / {
        proxy_pass http://ptc_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://ptc_api/health;
        access_log off;
    }
}
